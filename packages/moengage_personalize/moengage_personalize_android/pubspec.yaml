name: moengage_personalize_android
description: Android implementation of the moengage_personalize plugin
version: 0.1.1
homepage: https://www.moengage.com

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=3.0.0"

flutter:
  plugin:
    implements: moengage_personalize
    platforms:
      android:
        package: com.moengage.flutter.personalize
        pluginClass: MoEngagePersonalizePlugin
        dartPluginClass: MoEngagePersonalizeAndroid

dependencies:
  flutter:
    sdk: flutter
  moengage_personalize_platform_interface: ^0.1.1
  moengage_flutter: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  plugin_platform_interface: ^2.0.0